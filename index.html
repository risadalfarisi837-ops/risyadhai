<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISYADH - AI IMAGE ENGINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #e0e0e0;
            --main-black: #0a0a0a;
            --card-bg: #ffffff;
            --accent-primary: #6a0dad;  
            --accent-secondary: #ccff00; 
            --accent-tertiary: #ff5f00;  
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-head);
            background-color: var(--bg-color);
            color: var(--main-black);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* NAVBAR & MARQUEE */
        .marquee-top {
            background: var(--main-black); color: var(--card-bg); padding: 10px 0;
            font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold;
            border-bottom: 3px solid var(--accent-secondary); white-space: nowrap; overflow: hidden;
        }
        .marquee-content { display: inline-block; animation: scrollLeft 20s linear infinite; }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .navbar {
            display: flex; justify-content: center; align-items: center; padding: 1.5rem;
            background: rgba(255,255,255,0.9); border-bottom: 3px solid var(--main-black);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-glitch {
            font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; text-transform: uppercase;
        }

        /* CONTAINER & SEARCH BAR */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .search-card {
            background: var(--main-black); padding: 25px; border: 3px solid var(--accent-secondary);
            box-shadow: 8px 8px 0 var(--accent-primary); margin-bottom: 40px;
            display: flex; gap: 15px; flex-wrap: wrap;
        }

        .cyber-input {
            flex: 1; min-width: 250px; padding: 15px; border: 3px solid #fff;
            background: #fff; font-family: var(--font-mono); font-size: 1rem; font-weight: bold; outline: none;
        }

        .cyber-button {
            padding: 15px 30px; border: 3px solid #fff; background: var(--accent-secondary); 
            color: var(--main-black); font-family: var(--font-head); font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .cyber-button:active { transform: translate(3px, 3px); }

        /* GALLERY GRID */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .image-card {
            background: #fff; border: 3px solid var(--main-black);
            box-shadow: 5px 5px 0 var(--main-black); display: flex; flex-direction: column;
            opacity: 0; transform: translateY(20px); transition: all 0.4s ease;
        }

        .image-frame {
            width: 100%; height: 280px; border-bottom: 3px solid var(--main-black);
            background: #f0f0f0; overflow: hidden; position: relative;
        }

        .image-frame img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }
        .image-frame:hover img { transform: scale(1.05); }

        .image-info { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .prompt-text {
            font-family: var(--font-mono); font-size: 0.75rem; color: #333;
            line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;
        }

        .dl-btn {
            background: var(--accent-primary); color: #fff; border: 2px solid var(--main-black);
            padding: 10px; font-weight: bold; text-align: center; cursor: pointer; font-family: var(--font-mono);
            transition: 0.2s; font-size: 0.85rem; width: 100%;
        }
        .dl-btn:hover { background: var(--main-black); color: var(--accent-secondary); }

        /* UTILITIES */
        .hidden { display: none !important; }
        .loading-text { text-align: center; font-family: var(--font-mono); font-weight: bold; font-size: 1.2rem; margin: 40px 0; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="marquee-top">
        <div class="marquee-content">
            SYSTEM READY • RISYADH AI SEARCH • GENERATE IDEAS • HIGH RES DOWNLOAD • NO API KEY REQUIRED •
        </div>
    </div>

    <nav class="navbar">
        <div class="brand-glitch">RISYADH AI ENGINE</div>
    </nav>

    <div class="container">
        
        <div class="search-card">
            <input type="text" id="searchInput" class="cyber-input" placeholder="Masukkan kata kunci... (Cth: Cyberpunk City, Anime Boy)" autocomplete="off">
            <button onclick="searchImages()" id="searchBtn" class="cyber-button">EXPLORE</button>
        </div>

        <div id="loading" class="loading-text hidden">MENCARI DI DATABASE AI...</div>
        
        <div id="gallery" class="gallery-grid"></div>

    </div>

    <script>
        // Fitur tekan 'Enter' untuk langsung mencari
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                searchImages();
            }
        });

        async function searchImages() {
            const input = document.getElementById('searchInput').value.trim();
            const btn = document.getElementById('searchBtn');
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            if (!input) return alert("Masukkan kata kunci pencarian dulu!");

            // Reset UI
            btn.disabled = true;
            btn.innerText = "SEARCHING...";
            gallery.innerHTML = "";
            loading.classList.remove('hidden');

            try {
                // MEMBAJAK API LEXICA.ART SECARA LANGSUNG
                // API ini tidak butuh kunci dan memberikan ratusan gambar AI gratis
                const apiUrl = `https://lexica.art/api/v1/search?q=${encodeURIComponent(input)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (!data.images || data.images.length === 0) {
                    gallery.innerHTML = `<h3 style="text-align:center; width: 100%; font-family: monospace;">Tidak ada gambar ditemukan untuk "${input}". Coba bahasa Inggris.</h3>`;
                    return;
                }

                // Render Hasil Gambar (Maksimal ambil 20 gambar biar ngga berat)
                const limitImages = data.images.slice(0, 20);
                
                limitImages.forEach((img, index) => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    
                    // Animasi muncul berurutan
                    setTimeout(() => {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, index * 100);

                    // Menggunakan gambar resolusi tinggi dari Lexica
                    const highResUrl = img.src;
                    const prompt = img.prompt || "Tidak ada deskripsi";

                    card.innerHTML = `
                        <div class="image-frame">
                            <img src="${highResUrl}" alt="AI Image" loading="lazy">
                        </div>
                        <div class="image-info">
                            <div class="prompt-text">"${prompt}"</div>
                            <button class="dl-btn" onclick="forceDownload('${highResUrl}', this)">UNDUH GAMBAR (HD)</button>
                        </div>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                alert("Terjadi kesalahan sistem. Coba lagi nanti.");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "EXPLORE";
                loading.classList.add('hidden');
            }
        }

        // Fungsi Memaksa Download Gambar (Melewati blokir browser)
        async function forceDownload(imageUrl, btnElement) {
            const originalText = btnElement.innerText;
            btnElement.innerText = "MENGUNDUH...";
            btnElement.disabled = true;

            try {
                // Menggunakan proxy untuk mendownload agar tidak terhalang CORS
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(imageUrl));
                
                if (!response.ok) throw new Error("Gagal mengambil file");
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                // Membuat nama file acak
                a.download = `Risyadh_AI_${Math.floor(Math.random() * 10000)}.jpg`;
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);

            } catch (e) {
                // Jika proxy gagal, buka gambar di tab baru sebagai cadangan
                window.open(imageUrl, '_blank');
            } finally {
                btnElement.innerText = "BERHASIL!";
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.disabled = false;
                }, 2000);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risyadh AI - Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- MODERN AI THEME --- */
        :root {
            --bg-color: #0f172a;       /* Deep Slate/Dark Navy */
            --surface-color: #1e293b;  /* Lighter Slate */
            --accent-glow: #8b5cf6;    /* Soft Purple */
            --accent-blue: #3b82f6;    /* Soft Blue */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at top center, rgba(139, 92, 246, 0.15), transparent 50%);
        }

        /* --- NAVBAR --- */
        .navbar {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .header-text { margin-bottom: 40px; }
        .header-text h1 { font-size: 3rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
        .header-text p { font-size: 1.1rem; color: var(--text-muted); font-weight: 300; }

        /* --- PROMPT BAR --- */
        .prompt-box {
            background: var(--surface-color);
            padding: 8px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            margin-bottom: 40px;
        }
        
        .prompt-box:focus-within {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.2);
        }

        .prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        
        .prompt-input::placeholder { color: #64748b; }

        .generate-btn {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .generate-btn:hover { opacity: 0.9; transform: scale(0.98); }
        .generate-btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

        /* --- RESULT AREA --- */
        .result-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-card {
            background: var(--surface-color);
            border-radius: var(--radius-md);
            padding: 15px;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease-out forwards;
            display: none; /* Disembunyikan sampai ada hasil */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .img-wrapper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
            min-height: 300px;
        }

        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
        }

        .prompt-result-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: left;
            max-width: 70%;
            line-height: 1.4;
        }

        .download-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .download-btn:hover { background: white; color: black; }

        /* --- LOADING SPINNER --- */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 40px 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER */
        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Risyadh AI</div>
    </nav>

    <div class="container">
        
        <div class="header-text">
            <h1>Create anything.</h1>
            <p>Ubah imajinasimu menjadi karya seni visual yang menakjubkan.</p>
        </div>

        <div class="prompt-box">
            <input type="text" id="promptInput" class="prompt-input" placeholder="Deskripsikan gambar... (cth: a futuristic cyberpunk city at night, 8k resolution)" autocomplete="off">
            <button id="generateBtn" class="generate-btn" onclick="generateImage()">
                Generate ✨
            </button>
        </div>

        <div class="result-area">
            <div id="loading" class="loader">
                <div class="spinner"></div>
                <p style="color: var(--text-muted);">AI sedang melukis imajinasimu...</p>
            </div>

            <div id="imageCard" class="image-card">
                <div class="img-wrapper">
                    <img id="generatedImg" src="" alt="AI Generated Artwork">
                </div>
                <div class="action-row">
                    <div id="resultPrompt" class="prompt-result-text"></div>
                    <button class="download-btn" onclick="downloadImage()">Download HD</button>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p>Engineered by Risyadh • Powered by Pollinations AI</p>
    </footer>

    <script>
        // Jalankan dengan tombol Enter
        document.getElementById("promptInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                generateImage();
            }
        });

        // Simpan URL gambar yang sedang aktif untuk di-download
        let currentImageUrl = "";

        function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loading');
            const imageCard = document.getElementById('imageCard');
            const imgElement = document.getElementById('generatedImg');
            const promptText = document.getElementById('resultPrompt');

            if (!prompt) return alert("Tolong ketikkan deskripsi gambar terlebih dahulu.");

            // Reset & Tampilkan Loading
            btn.disabled = true;
            btn.innerHTML = "Generating...";
            imageCard.style.display = "none";
            loader.style.display = "flex";

            // Rahasia Utama: Menembak Pollinations AI secara langsung.
            // Tambahkan seed acak agar jika kita mengetik prompt yang sama, hasilnya tetap berbeda.
            const randomSeed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${randomSeed}`;
            
            currentImageUrl = imageUrl;

            // Kita memanipulasi event 'onload' pada gambar untuk mengetahui kapan AI selesai merender
            imgElement.src = imageUrl;

            imgElement.onload = function() {
                // Gambar selesai di-render oleh AI
                loader.style.display = "none";
                promptText.innerText = `"${prompt}"`;
                imageCard.style.display = "block";
                
                btn.disabled = false;
                btn.innerHTML = "Generate ✨";
            };

            imgElement.onerror = function() {
                // Jika terjadi gagal muat
                loader.style.display = "none";
                alert("Gagal merender gambar. Coba deskripsi yang lain.");
                btn.disabled = false;
                btn.innerHTML = "Generate ✨";
            };
        }

        // Fungsi Download Gambar
        async function downloadImage() {
            if (!currentImageUrl) return;

            try {
                // Tarik data gambar (Blob) untuk menghindari block browser saat mendownload
                const response = await fetch(currentImageUrl);
                const blob = await response.blob();
                
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `Risyadh_AI_Art_${Date.now()}.jpg`;
                
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) {
                // Fallback jika fetch terblokir: Buka gambar di tab baru
                window.open(currentImageUrl, '_blank');
            }
        }
    </script>
</body>
</html>

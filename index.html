<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Risyadh.ai - Realtime Generation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- KREA.AI MOBILE THEME --- */
        :root {
            --bg-base: #000000;
            --bg-panel: #0f0f0f;
            --bg-input: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-white: #ffffff;
            --accent-dark: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- TOP NAVBAR --- */
        .header {
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-base);
            flex-shrink: 0;
        }

        .logo {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-white);
            border-radius: 2px;
        }

        .top-tabs {
            display: flex;
            gap: 15px;
        }

        .top-tabs span {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .top-tabs span.active {
            color: var(--text-primary);
        }

        /* --- MAIN WORKSPACE (MOBILE LAYOUT) --- */
        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: calc(100vh - 56px);
        }

        /* --- CANVAS AREA (TOP HALF) --- */
        .canvas-area {
            flex: 1;
            background-color: #050505;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }

        .canvas-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .placeholder {
            color: #333;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .placeholder svg {
            width: 32px;
            height: 32px;
            opacity: 0.5;
        }

        .result-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Loader Krea Style */
        .loading-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: transparent;
            display: none;
        }

        .loading-bar {
            height: 100%;
            width: 30%;
            background: #fff;
            animation: loadingSwipe 1s infinite ease-in-out;
        }

        @keyframes loadingSwipe {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* Floating Actions on Canvas */
        .canvas-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            display: none;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* --- CONTROL AREA (BOTTOM HALF) --- */
        .controls-area {
            height: 45vh; /* Takes roughly bottom half on mobile */
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }

        /* Sub-Tabs (Txt2Img / Img2Img) */
        .sub-tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .sub-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .sub-tab.active {
            background: #2a2a2a;
            color: var(--text-primary);
        }

        /* Prompt Input */
        .prompt-container {
            position: relative;
            margin-bottom: 16px;
        }

        .prompt-input {
            width: 100%;
            height: 90px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .prompt-input:focus {
            border-color: #555;
        }

        /* Style Chips */
        .styles-container {
            margin-bottom: 20px;
        }
        
        .styles-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .styles-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .styles-scroll::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        .style-chip {
            padding: 6px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }

        .style-chip.active {
            background: var(--accent-white);
            color: #000;
            border-color: var(--accent-white);
        }

        /* Generate Button */
        .btn-generate {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-white);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-generate:active { transform: scale(0.98); }
        .btn-generate:disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Message for unavailable features */
        .coming-soon-panel {
            display: none;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
        }
        
        .coming-soon-panel h3 { color: var(--text-primary); margin-bottom: 10px; font-size: 16px; }
        .coming-soon-panel p { font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-dot"></div>
            RISYADH.AI
        </div>
        <div class="top-tabs">
            <span class="active" onclick="switchMainTab('generate', this)">Generate</span>
            <span onclick="switchMainTab('enhance', this)">Enhance</span>
            <span onclick="switchMainTab('video', this)">Video</span>
        </div>
    </header>

    <div class="workspace">
        
        <main class="canvas-area">
            <div class="canvas-wrapper">
                
                <div id="placeholder" class="placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    Realtime Canvas
                </div>

                <img id="resultImage" class="result-image" alt="Output">

                <div id="loadingBar" class="loading-bar-container">
                    <div class="loading-bar"></div>
                </div>

                <div id="canvasActions" class="canvas-actions">
                    <button class="icon-btn" onclick="downloadImage()" title="Download">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <aside class="controls-area" id="controlsPanel">
            
            <div class="sub-tabs">
                <div class="sub-tab active" onclick="switchSubTab('txt2img', this)">Text to Image</div>
                <div class="sub-tab" onclick="switchSubTab('img2img', this)">Image to Image</div>
            </div>

            <div id="txt2imgPanel">
                <div class="prompt-container">
                    <textarea id="promptInput" class="prompt-input" placeholder="Type a prompt... (e.g., A cinematic shot of a futuristic cyberpunk city)"></textarea>
                </div>

                <div class="styles-container">
                    <div class="styles-label">AI STYLES</div>
                    <div class="styles-scroll">
                        <div class="style-chip active" onclick="selectStyle(this, '')">None</div>
                        <div class="style-chip" onclick="selectStyle(this, ', cinematic lighting, ultra realistic, 8k')">Cinematic</div>
                        <div class="style-chip" onclick="selectStyle(this, ', studio ghibli anime style, highly detailed masterpiece')">Anime</div>
                        <div class="style-chip" onclick="selectStyle(this, ', 3d blender render, unreal engine 5, octane render')">3D Render</div>
                        <div class="style-chip" onclick="selectStyle(this, ', dark fantasy concept art, grimdark, trending on artstation')">Dark Fantasy</div>
                    </div>
                </div>

                <button id="generateBtn" class="btn-generate" onclick="startGeneration()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    Generate
                </button>
            </div>

            <div id="img2imgPanel" style="display:none; text-align:center; padding: 20px 0;">
                <p style="font-size:12px; color:#888; margin-bottom:15px;">Upload a base image to guide the AI</p>
                <button class="btn-generate" style="background:#222; color:#fff;" onclick="alert('Fitur Upload Image akan segera hadir!')">
                    + Upload Image
                </button>
            </div>

        </aside>

        <aside class="controls-area coming-soon-panel" id="comingSoonPanel">
            <h3>Development Stage</h3>
            <p>Fitur <span id="featureName" style="color:var(--text-primary); font-weight:bold;"></span> membutuhkan server GPU khusus. Fitur ini sedang dalam tahap pengembangan oleh Risyadh.</p>
        </aside>

    </div>

    <script>
        // Tab Management Logic
        function switchMainTab(tab, element) {
            // Update active styling
            document.querySelectorAll('.top-tabs span').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const controlsPanel = document.getElementById('controlsPanel');
            const comingSoonPanel = document.getElementById('comingSoonPanel');
            const featureName = document.getElementById('featureName');

            if (tab === 'generate') {
                controlsPanel.style.display = 'flex';
                comingSoonPanel.style.display = 'none';
            } else {
                controlsPanel.style.display = 'none';
                comingSoonPanel.style.display = 'flex';
                featureName.innerText = tab === 'enhance' ? 'AI Enhance (Upscale)' : 'AI Video Generation';
            }
        }

        function switchSubTab(tab, element) {
            document.querySelectorAll('.sub-tab').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('txt2imgPanel').style.display = tab === 'txt2img' ? 'block' : 'none';
            document.getElementById('img2imgPanel').style.display = tab === 'img2img' ? 'block' : 'none';
        }

        // Style Selection Logic
        let currentStyleModifier = "";
        function selectStyle(element, styleText) {
            document.querySelectorAll('.style-chip').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentStyleModifier = styleText;
        }

        // Generate Logic
        let currentImageBlob = null;

        function startGeneration() {
            const prompt = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const placeholder = document.getElementById('placeholder');
            const loader = document.getElementById('loadingBar');
            const img = document.getElementById('resultImage');
            const actions = document.getElementById('canvasActions');

            if (!prompt) {
                alert("Tolong ketikkan prompt terlebih dahulu.");
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btn.innerHTML = "Generating...";
            placeholder.style.display = "none";
            img.style.display = "none";
            img.style.opacity = "0";
            actions.style.display = "none";
            loader.style.display = "block";

            // Menggabungkan Prompt user + Style Chip yang dipilih
            const finalPrompt = prompt + currentStyleModifier;
            const seed = Math.floor(Math.random() * 1000000); 
            
            // Pollinations AI API (Direct render)
            const aiUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=768&height=768&seed=${seed}&nologo=true`;

            fetch(aiUrl)
                .then(response => {
                    if(!response.ok) throw new Error("Gagal terhubung ke server AI");
                    return response.blob();
                })
                .then(blob => {
                    currentImageBlob = blob;
                    const objectURL = URL.createObjectURL(blob);
                    
                    img.src = objectURL;
                    
                    img.onload = () => {
                        loader.style.display = "none";
                        img.style.display = "block";
                        // Efek Fade-in
                        setTimeout(() => { img.style.opacity = "1"; }, 50); 
                        
                        actions.style.display = "flex";
                        btn.disabled = false;
                        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Generate`;
                    };
                })
                .catch(error => {
                    alert("Proses gagal. Silakan coba lagi.");
                    loader.style.display = "none";
                    placeholder.style.display = "flex";
                    btn.disabled = false;
                    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Generate`;
                });
        }

        // Download Logic
        function downloadImage() {
            if (!currentImageBlob) return;
            
            const url = URL.createObjectURL(currentImageBlob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `Risyadh_AI_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
